version: '3.8'

services:
  etcd:
    container_name: myrag-etcd
    image: quay.io/coreos/etcd:v3.5.0
    environment:
      - ETCD_AUTO_COMPACTION_RETENTION_REASON=periodic
      - ETCD_AUTO_COMPACTION_RETENTION_RUNTIME=1h
    command: etcd -advertise-client-urls http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    volumes:
      - etcd-data:/etcd

  minio:
    container_name: myrag-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    command: minio server /data
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    container_name: myrag-milvus
    image: milvusdb/milvus:v2.4.0
    command: ["milvus", "run", "standalone"]
    environment:
      - ETCD_ENDPOINTS=etcd:2379
      - MINIO_ADDRESS=minio:9000
    volumes:
      - milvus-data:/var/lib/milvus
    ports:
      - "19530:19530"
    depends_on:
      - "etcd"
      - "minio"

  rag-api:
    container_name: my-rag-api
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./config_server.yaml:/app/config_rag.yaml
      - hf_cache:/root/.cache/huggingface
    environment:
      - RAG_CONFIG_PATH=/app/config_rag.yaml
      - OPENAI_API_KEY=dummy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0', '1']
              capabilities: [gpu]
    # Critical fixes from server documentation
    pids_limit: -1
    security_opt:
      - seccomp:unconfined
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - milvus
    restart: unless-stopped

volumes:
  etcd-data:
  minio-data:
  milvus-data:
  hf_cache:
