# Server Configuration for Docker Deployment
ingestion:
  chunk_size: 1000
  chunk_overlap: 200
  pdf_parser: "docling"
  pdf_chunking_strategy: "hierarchical"
  html_parser: "trafilatura"
  html_chunking_strategy: "standard"
  save_snapshots: true
  incremental: true
  state_path: "storage/ingestion_state_rebuild_20260422_132325.json"

embedding:
  dense_model: "microsoft/harrier-oss-v1-0.6b"
  sparse_model: "opensearch-project/opensearch-neural-sparse-encoding-doc-v3-gte"
  device: "cuda"
  dense_device: "cuda:0"
  sparse_device: "cuda:0"
  batch_size: 1
  quantize_8bit: true

storage:
  milvus_uri: "http://127.0.0.1:19530"
  collection_name: "documents_rebuild_20260422_132325"
  db_name: "default"
  metric_type: "COSINE"

retrieval:
  k: 15                         # Candidate pool fetched from Milvus before reranking
  rerank_top_k: 5               # Docs passed to the LLM after reranking
  hybrid_weight: 0.5
  reranker_model: null
  reranker_endpoint: "http://127.0.0.1:8012/v1/rerank"
  min_score: 0.0

generation:
  llm_endpoint: "http://127.0.0.1:11434/v1"
  model_name: "qwen3.5:latest"
  max_tokens: 512
  temperature: 0.2
  reasoning_effort: "none"
  structured_response: true

evaluation:
  metrics: ["faithfulness", "answer_relevancy", "context_precision", "context_recall"]
  eval_llm: "gpt-4o-mini"
  eval_embeddings: "all-MiniLM-L6-v2"
  num_synthetic_qa: 3
